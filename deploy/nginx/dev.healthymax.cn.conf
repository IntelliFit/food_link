server {
    listen 80;
    listen [::]:80;
    server_name dev.healthymax.cn;

    # LetsEncrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.healthymax.cn;

    ssl_certificate /etc/letsencrypt/live/dev.healthymax.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.healthymax.cn/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dev.healthymax.cn/chain.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    etag off;
    if_modified_since off;
    expires off;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_pass http://127.0.0.1:3011;
    }
}
