name: Deploy Backend

on:
  push:
    branches:
      - main   # 只在推送到 main 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # 避免首次连接时卡在 host key 确认
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_SERVICE: food-backend
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh \
            -p "${PORT}" \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            -i ~/.ssh/id_rsa \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "set -e; cd ${DEPLOY_PATH} && \
            if [ -f ./deploy_backend.sh ]; then \
              bash ./deploy_backend.sh ${DEPLOY_PATH} ${DEPLOY_BRANCH} ${DEPLOY_SERVICE} || bash ./deploy_backend.sh; \
            elif [ -f ./deploy/scripts/deploy_backend_v2.sh ]; then \
              bash ./deploy/scripts/deploy_backend_v2.sh ${DEPLOY_PATH} ${DEPLOY_BRANCH} ${DEPLOY_SERVICE}; \
            elif [ -f ./deploy/scripts/deploy_backend.sh ]; then \
              bash ./deploy/scripts/deploy_backend.sh; \
            else \
              echo 'deploy script not found'; \
              exit 1; \
            fi"
