[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# 每个测试用例单独计时，超时则失败（pytest-timeout）；仅统计测试函数体，不含冗长 fixture
timeout = 120
timeout_func_only = true
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (override with @pytest.mark.timeout)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
